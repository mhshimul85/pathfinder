<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ESP Firebase Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: #dfe5ee;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --ok: #15803d;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1, h2 { margin: 0 0 12px; }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }
    .row > div {
      flex: 1 1 220px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border: none;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
    }
    .ok { color: var(--ok); }
    .danger { color: var(--danger); }
    .cards {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 12px;
    }
    .mini {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }
    .mini .value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 6px;
    }
    .table-wrap {
      overflow: auto;
      margin-top: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      font-size: 14px;
    }
    th { background: #eef3fb; }
    canvas {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ESP Firebase Dashboard</h1>

    <div class="section">
      <h2>Firmware Version</h2>
      <div class="row">
        <div>
          <label>Current target firmware</label>
          <input type="text" id="currentFirmware" readonly />
        </div>
        <div>
          <label>Set new target firmware</label>
          <input type="text" id="newFirmware" placeholder="e.g. 1.0.1" />
        </div>
        <div>
          <button id="saveFirmwareBtn">Save Firmware Version</button>
        </div>
      </div>
      <div class="status" id="firmwareStatus"></div>
    </div>

    <div class="section">
      <h2>Device Analytics</h2>

      <div class="row">
        <div>
          <label>Device</label>
          <select id="deviceSelect"></select>
        </div>
        <div>
          <label>View</label>
          <select id="viewMode">
            <option value="hourly">Hourly</option>
            <option value="daily">Daily</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div>
          <label>Chart metric</label>
          <select id="metricSelect">
            <option value="temperature">Temperature</option>
            <option value="humidity">Humidity</option>
            <option value="light_status">Light Status</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div id="hourlyPickerWrap">
          <label>Date for hourly view</label>
          <input type="date" id="hourlyDate" />
        </div>
        <div id="dailyPickerWrap" class="hidden">
          <label>Month for daily view</label>
          <input type="month" id="dailyMonth" />
        </div>
        <div id="monthlyPickerWrap" class="hidden">
          <label>Year for monthly view</label>
          <input type="number" id="monthlyYear" min="2020" max="2100" step="1" />
        </div>
        <div>
          <button id="loadBtn">Load</button>
        </div>
      </div>

      <div class="cards">
        <div class="mini"><div>Current temperature</div><div class="value" id="cardTemp">-</div></div>
        <div class="mini"><div>Current humidity</div><div class="value" id="cardHumidity">-</div></div>
        <div class="mini"><div>Current light status</div><div class="value" id="cardLight">-</div></div>
        <div class="mini"><div>Last seen</div><div class="value" id="cardLastSeen" style="font-size:16px;">-</div></div>
      </div>

      <div class="status" id="analyticsStatus"></div>
      <canvas id="chart" height="120"></canvas>
      <div class="table-wrap" id="tableWrap"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      onValue,
      set
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
		apiKey: "AIzaSyDZWXMSdFH-EivJySs__ZtZGUHf24R0dRQ",
		authDomain: "pathfinder-f171e.firebaseapp.com",
		databaseURL: "https://pathfinder-f171e-default-rtdb.asia-southeast1.firebasedatabase.app",
		projectId: "pathfinder-f171e",
		storageBucket: "pathfinder-f171e.firebasestorage.app",
		messagingSenderId: "348872504232",
		appId: "1:348872504232:web:e2067ab2881799fe58a39d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const currentFirmware = document.getElementById("currentFirmware");
    const newFirmware = document.getElementById("newFirmware");
    const saveFirmwareBtn = document.getElementById("saveFirmwareBtn");
    const firmwareStatus = document.getElementById("firmwareStatus");

    const deviceSelect = document.getElementById("deviceSelect");
    const viewMode = document.getElementById("viewMode");
    const metricSelect = document.getElementById("metricSelect");
    const hourlyDate = document.getElementById("hourlyDate");
    const dailyMonth = document.getElementById("dailyMonth");
    const monthlyYear = document.getElementById("monthlyYear");
    const loadBtn = document.getElementById("loadBtn");
    const analyticsStatus = document.getElementById("analyticsStatus");
    const tableWrap = document.getElementById("tableWrap");

    const hourlyPickerWrap = document.getElementById("hourlyPickerWrap");
    const dailyPickerWrap = document.getElementById("dailyPickerWrap");
    const monthlyPickerWrap = document.getElementById("monthlyPickerWrap");

    const cardTemp = document.getElementById("cardTemp");
    const cardHumidity = document.getElementById("cardHumidity");
    const cardLight = document.getElementById("cardLight");
    const cardLastSeen = document.getElementById("cardLastSeen");

    let chartInstance = null;

    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, "0");
    const dd = String(now.getDate()).padStart(2, "0");
    hourlyDate.value = `${yyyy}-${mm}-${dd}`;
    dailyMonth.value = `${yyyy}-${mm}`;
    monthlyYear.value = yyyy;

    onValue(ref(db, "config/target_firmware"), (snap) => {
      const val = snap.exists() ? snap.val() : "";
      currentFirmware.value = val;
      if (!newFirmware.value) newFirmware.value = val;
    });

    saveFirmwareBtn.addEventListener("click", async () => {
      const value = newFirmware.value.trim();
      if (!value) {
        firmwareStatus.textContent = "Enter a firmware version.";
        firmwareStatus.className = "status danger";
        return;
      }

      try {
        await set(ref(db, "config/target_firmware"), value);
        firmwareStatus.textContent = "Firmware version updated.";
        firmwareStatus.className = "status ok";
      } catch (err) {
        firmwareStatus.textContent = `Save failed: ${err.message}`;
        firmwareStatus.className = "status danger";
      }
    });

    onValue(ref(db, "devices"), (snap) => {
      const devices = snap.val() || {};
      const prev = deviceSelect.value;
      deviceSelect.innerHTML = "";

      const ids = Object.keys(devices).sort();
      if (ids.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No devices yet";
        deviceSelect.appendChild(opt);
        renderEmpty();
        return;
      }

      ids.forEach((id) => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = devices[id]?.meta?.name || id;
        deviceSelect.appendChild(opt);
      });

      if (ids.includes(prev)) deviceSelect.value = prev;
      loadCurrentCard();
      loadAnalytics();
    });

    function syncPickers() {
      hourlyPickerWrap.classList.toggle("hidden", viewMode.value !== "hourly");
      dailyPickerWrap.classList.toggle("hidden", viewMode.value !== "daily");
      monthlyPickerWrap.classList.toggle("hidden", viewMode.value !== "monthly");
    }

    viewMode.addEventListener("change", () => {
      syncPickers();
      loadAnalytics();
    });

    metricSelect.addEventListener("change", loadAnalytics);
    deviceSelect.addEventListener("change", () => {
      loadCurrentCard();
      loadAnalytics();
    });
    hourlyDate.addEventListener("change", loadAnalytics);
    dailyMonth.addEventListener("change", loadAnalytics);
    monthlyYear.addEventListener("change", loadAnalytics);
    loadBtn.addEventListener("click", loadAnalytics);

    syncPickers();

    function formatDateTime(ms) {
      if (!ms) return "-";
      const d = new Date(Number(ms));
      return d.toLocaleString();
    }

    function metricLabel(metric) {
      if (metric === "temperature") return "Temperature";
      if (metric === "humidity") return "Humidity";
      return "Light Status";
    }

    function avg(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function sortKeys(obj) {
      return Object.keys(obj || {}).sort((a, b) => a.localeCompare(b));
    }

    function renderChart(labels, values, metric) {
      const ctx = document.getElementById("chart").getContext("2d");
      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: metricLabel(metric),
            data: values,
            tension: 0.25
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true
        }
      });
    }

    function renderTable(headers, rows) {
      if (!rows.length) {
        tableWrap.innerHTML = "<p>No data found for that selection.</p>";
        return;
      }

      let html = "<table><thead><tr>";
      headers.forEach(h => html += `<th>${h}</th>`);
      html += "</tr></thead><tbody>";

      rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += "</tr>";
      });

      html += "</tbody></table>";
      tableWrap.innerHTML = html;
    }

    function renderEmpty() {
      analyticsStatus.textContent = "No device data found.";
      cardTemp.textContent = "-";
      cardHumidity.textContent = "-";
      cardLight.textContent = "-";
      cardLastSeen.textContent = "-";
      if (chartInstance) chartInstance.destroy();
      tableWrap.innerHTML = "";
    }

    async function loadCurrentCard() {
      const deviceId = deviceSelect.value;
      if (!deviceId) return;

      try {
        const [metaSnap, currentSnap] = await Promise.all([
          get(ref(db, `devices/${deviceId}/meta`)),
          get(ref(db, `devices/${deviceId}/current`))
        ]);

        const meta = metaSnap.val() || {};
        const current = currentSnap.val() || {};

        cardTemp.textContent = current.temperature ?? "-";
        cardHumidity.textContent = current.humidity ?? "-";
        cardLight.textContent = current.light_status ?? "-";
        cardLastSeen.textContent = formatDateTime(meta.last_seen || current.timestamp);
      } catch (err) {
        analyticsStatus.textContent = `Current data load failed: ${err.message}`;
        analyticsStatus.className = "status danger";
      }
    }

    async function loadAnalytics() {
      const deviceId = deviceSelect.value;
      if (!deviceId) {
        renderEmpty();
        return;
      }

      analyticsStatus.textContent = "Loading...";
      analyticsStatus.className = "status";

      try {
        if (viewMode.value === "hourly") {
          await loadHourly(deviceId);
        } else if (viewMode.value === "daily") {
          await loadDaily(deviceId);
        } else {
          await loadMonthly(deviceId);
        }
        analyticsStatus.textContent = "Loaded";
        analyticsStatus.className = "status ok";
      } catch (err) {
        analyticsStatus.textContent = `Load failed: ${err.message}`;
        analyticsStatus.className = "status danger";
      }
    }

    async function loadHourly(deviceId) {
      const [y, m, d] = hourlyDate.value.split("-");
      const snap = await get(ref(db, `devices/${deviceId}/readings/${y}/${m}/${d}`));
      const dayData = snap.val() || {};
      const metric = metricSelect.value;

      const labels = [];
      const values = [];
      const rows = [];

      sortKeys(dayData).forEach(slot => {
        const r = dayData[slot];
        const label = `${slot.slice(0,2)}:${slot.slice(2,4)}`;
        labels.push(label);
        values.push(Number(r[metric] ?? 0));
        rows.push([
          label,
          r.temperature ?? "",
          r.humidity ?? "",
          r.light_status ?? "",
          formatDateTime(r.timestamp)
        ]);
      });

      renderChart(labels, values, metric);
      renderTable(
        ["Time", "Temperature", "Humidity", "Light Status", "Timestamp"],
        rows
      );
    }

    async function loadDaily(deviceId) {
      const [y, m] = dailyMonth.value.split("-");
      const snap = await get(ref(db, `devices/${deviceId}/readings/${y}/${m}`));
      const monthData = snap.val() || {};
      const metric = metricSelect.value;

      const labels = [];
      const values = [];
      const rows = [];

      sortKeys(monthData).forEach(day => {
        const dayObj = monthData[day] || {};
        const items = Object.values(dayObj);
        if (!items.length) return;

        const temps = items.map(x => Number(x.temperature ?? 0));
        const hums  = items.map(x => Number(x.humidity ?? 0));
        const lights = items.map(x => Number(x.light_status ?? 0));

        const metricValue =
          metric === "temperature" ? avg(temps) :
          metric === "humidity" ? avg(hums) :
          avg(lights);

        labels.push(day);
        values.push(metricValue);

        rows.push([
          `${y}-${m}-${day}`,
          avg(temps).toFixed(2),
          avg(hums).toFixed(2),
          avg(lights).toFixed(2),
          items.length
        ]);
      });

      renderChart(labels, values, metric);
      renderTable(
        ["Date", "Avg Temperature", "Avg Humidity", "Avg Light Status", "Records"],
        rows
      );
    }

    async function loadMonthly(deviceId) {
      const y = String(monthlyYear.value).trim();
      const snap = await get(ref(db, `devices/${deviceId}/readings/${y}`));
      const yearData = snap.val() || {};
      const metric = metricSelect.value;

      const labels = [];
      const values = [];
      const rows = [];

      sortKeys(yearData).forEach(month => {
        const monthObj = yearData[month] || {};
        const allItems = [];

        sortKeys(monthObj).forEach(day => {
          const dayObj = monthObj[day] || {};
          sortKeys(dayObj).forEach(slot => {
            allItems.push(dayObj[slot]);
          });
        });

        if (!allItems.length) return;

        const temps = allItems.map(x => Number(x.temperature ?? 0));
        const hums  = allItems.map(x => Number(x.humidity ?? 0));
        const lights = allItems.map(x => Number(x.light_status ?? 0));

        const metricValue =
          metric === "temperature" ? avg(temps) :
          metric === "humidity" ? avg(hums) :
          avg(lights);

        labels.push(month);
        values.push(metricValue);

        rows.push([
          `${y}-${month}`,
          avg(temps).toFixed(2),
          avg(hums).toFixed(2),
          avg(lights).toFixed(2),
          allItems.length
        ]);
      });

      renderChart(labels, values, metric);
      renderTable(
        ["Month", "Avg Temperature", "Avg Humidity", "Avg Light Status", "Records"],
        rows
      );
    }
  </script>
</body>
</html>
